name: nounou_express
description: "Application de mise en relation nounous / familles - Nounou Express."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

# NOTE (audit 2026-07) : ce pubspec ne déclare que les dépendances réellement
# importées par le code. Les packages du backend (firebase_auth,
# cloud_firestore, firebase_messaging, geolocator, google_maps_flutter,
# image_picker, flutter_secure_storage, etc.) seront réintroduits au fur et à
# mesure de l'implémentation réelle des fonctionnalités (voir AUDIT.md).
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Fonts ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── State management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.6.2

  # ── UI / Animations ──────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # ── Firebase ─────────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.4             # Auth téléphone OTP (backend réel, Phase 3)
  cloud_firestore: ^5.6.9           # Implémentations Firestore des repositories
  firebase_messaging: ^15.2.5      # Notifications push (tokens + handlers)
  firebase_storage: ^12.4.5        # Upload CNI (bucket à accès restreint)

  # ── Médias ───────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2             # Sélection photo CNI

  # ── Stockage local ───────────────────────────────────────────────────────────
  shared_preferences: ^2.5.3       # Préférences utilisateur (état d'auth mock)

  # ── Utilitaires ──────────────────────────────────────────────────────────────
  intl: ^0.19.0                    # Dates, monnaie (fr_FR)
  url_launcher: ^6.3.1             # Appels téléphoniques (écran SOS)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/onboarding/     # Photos onboarding
    - assets/icons/                 # Icônes (Google, etc.)
