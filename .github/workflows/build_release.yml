name: Build Release

# Workflow de release : à la demande (Actions → Run workflow) ou sur tag v*.
# La validation continue (analyze/tests/web/AAB) est déjà couverte par ci.yml
# à chaque push — inutile de builder deux fois par commit.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      # Secrets requis (voir docs/KEYSTORE.md) :
      #  - KEYSTORE_BASE64 : le fichier .jks encodé en base64
      #  - KEY_PROPERTIES  : le contenu complet de android/key.properties
      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/nounou-express-release.jks

      - name: Create key.properties
        run: echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
